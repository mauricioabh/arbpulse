# fly.toml app configuration file for arb-pulse
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arb-pulse'
primary_region = 'sin'

[build]

[env]
  CIRCUIT_BREAKER_COOLDOWN_MS = '15000'
  CIRCUIT_BREAKER_LOSSES = '5'
  DEMO_MODE = 'false'
  FLICKER_CONFIRM_MS = '150'
  INITIAL_BTC = '0.5'
  INITIAL_USDT = '50000'
  LATENCY_MS = '120'
  LATENCY_SLIPPAGE_BPS = '2'
  MAX_TRADE_BTC = '0.25'
  MIN_NET_PROFIT_PCT = '0.0005'
  PORT = '8080'
  RECORD_FEED = 'false'
  STALE_MS = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
